<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Hub Login</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f8ff;
        --surface: #ffffff;
        --text: #0f1f34;
        --muted: #42536c;
        --border: #8ca5d8;
        --accent: #0047ff;
        --danger: #b00020;
        font-family: "Avenir Next", "Inter", "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 10% 10%, #dde8ff 0%, var(--bg) 45%, #edf3ff 100%);
        color: var(--text);
      }
      .card {
        width: min(420px, 92vw);
        border: 2px solid var(--border);
        background: var(--surface);
        border-radius: 16px;
        padding: 1.1rem;
        box-shadow: 0 10px 24px rgba(15, 31, 52, 0.12);
      }
      h1 {
        margin: 0;
      }
      .subtitle {
        margin-top: 0.25rem;
        color: var(--muted);
        font-size: 0.92rem;
      }
      form {
        margin-top: 1rem;
        display: grid;
        gap: 0.75rem;
      }
      label {
        display: grid;
        gap: 0.35rem;
        color: var(--muted);
        font-weight: 700;
        font-size: 0.9rem;
      }
      input,
      button {
        font: inherit;
        border: 2px solid #97add6;
        border-radius: 10px;
        padding: 0.6rem 0.7rem;
        min-height: 42px;
      }
      button {
        cursor: pointer;
        color: #fff;
        border-color: #003dd9;
        background: var(--accent);
        font-weight: 800;
      }
      .error {
        min-height: 1.2rem;
        color: var(--danger);
        font-size: 0.9rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Family Hub</h1>
      <p class="subtitle">Sign in to manage bills and documents</p>
      <form id="loginForm">
        <label>Username <input id="username" name="username" required autocomplete="username" /></label>
        <label>Password <input id="password" name="password" type="password" required autocomplete="current-password" /></label>
        <div id="loginError" class="error"></div>
        <button type="submit">Log in</button>
      </form>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("loginError");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.textContent = "";
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        try {
          const response = await fetch("/auth/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          if (!response.ok) {
            errorBox.textContent = "Invalid username or password.";
            return;
          }
          window.location.href = "/";
        } catch {
          errorBox.textContent = "Login failed. Please try again.";
        }
      });
    </script>
  </body>
</html>
