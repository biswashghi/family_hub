<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Family Hub Login</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f5f0e8;
        --ivory: #fbf7f1;
        --forest: #1f3b2f;
        --ink: #1a1f1b;
        --muted: #5d665f;
        --line: #d4c9b8;
        --coral: #cf6f5e;
        font-family: "Inter", "Avenir Next", "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(195, 163, 91, 0.18), transparent 30%),
          radial-gradient(circle at 80% 10%, rgba(118, 140, 109, 0.16), transparent 34%),
          linear-gradient(180deg, #f9f5ef 0%, var(--paper) 100%);
      }
      .card {
        width: min(440px, 100%);
        border: 1px solid var(--line);
        background: rgba(251, 247, 241, 0.92);
        border-radius: 28px;
        padding: 1.2rem;
        box-shadow: 0 18px 40px rgba(26, 31, 27, 0.08);
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.72rem;
        font-weight: 800;
        color: var(--muted);
      }
      h1 {
        margin: 0.45rem 0 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: 2.2rem;
      }
      .subtitle {
        margin-top: 0.45rem;
        color: var(--muted);
        line-height: 1.5;
      }
      form {
        margin-top: 1.15rem;
        display: grid;
        gap: 0.8rem;
      }
      label {
        display: grid;
        gap: 0.38rem;
        color: var(--ink);
        font-weight: 700;
        font-size: 0.92rem;
      }
      input,
      button {
        font: inherit;
        min-height: 46px;
        border-radius: 14px;
      }
      input {
        border: 1px solid var(--line);
        padding: 0.72rem 0.82rem;
        background: #fff;
      }
      button {
        border: 1px solid rgba(31, 59, 47, 0.95);
        background: var(--forest);
        color: #fff;
        font-weight: 800;
        padding: 0.72rem 0.95rem;
      }
      .demoButton {
        background: rgba(255, 255, 255, 0.62);
        color: var(--forest);
        border-color: var(--line);
      }
      .error {
        min-height: 1.2rem;
        color: #9e3522;
        font-size: 0.92rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Private household command center</div>
      <h1>Family Hub</h1>
      <p id="loginSubtitle" class="subtitle">Sign in to your household dashboard for bills, home upkeep, important documents, and quick notes.</p>
      <form id="loginForm">
        <label>Username <input id="username" name="username" required autocomplete="username" /></label>
        <label>Password <input id="password" name="password" type="password" required autocomplete="current-password" /></label>
        <div id="loginError" class="error"></div>
        <button id="submitBtn" type="submit">Enter Family Hub</button>
        <button id="demoBtn" class="demoButton" type="button">View read-only demo</button>
      </form>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("loginError");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const subtitle = document.getElementById("loginSubtitle");
      const submitBtn = document.getElementById("submitBtn");
      const demoBtn = document.getElementById("demoBtn");
      let setupRequired = false;

      async function loadAuthStatus() {
        try {
          const response = await fetch("/auth/status");
          const status = await response.json();
          setupRequired = !!status.setup_required;
          if (setupRequired) {
            subtitle.textContent = "Create the first Family Hub sign-in for your household.";
            submitBtn.textContent = "Create Family Login";
            passwordInput.autocomplete = "new-password";
          }
        } catch {
          errorBox.textContent = "Could not load sign-in status.";
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.textContent = "";
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        const path = setupRequired ? "/auth/setup" : "/auth/login";

        try {
          const response = await fetch(path, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          if (!response.ok) {
            if (setupRequired && response.status === 400) {
              errorBox.textContent = "Use a username with 3+ characters and a password with 12+ characters.";
            } else {
              errorBox.textContent = setupRequired ? "Could not create login." : "Invalid username or password.";
            }
            return;
          }

          window.location.href = "/";
        } catch {
          errorBox.textContent = "Login failed. Please try again.";
        }
      });

      async function startDemo() {
        errorBox.textContent = "";
        try {
          const response = await fetch("/auth/demo", { method: "POST" });
          if (!response.ok) {
            errorBox.textContent = "Demo is not available right now.";
            return;
          }
          window.location.href = "/";
        } catch {
          errorBox.textContent = "Demo failed to load. Please try again.";
        }
      }

      demoBtn.addEventListener("click", startDemo);
      loadAuthStatus();
      if (new URLSearchParams(window.location.search).get("demo") === "1") {
        startDemo();
      }
    </script>
  </body>
</html>
