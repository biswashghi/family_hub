services:
  family-hub:
    build:
      context: .
    container_name: family-hub
    restart: unless-stopped
    environment:
      - PORT=8787
      - DATA_DIR=/app/data
      - FAMILY_HUB_USERNAME=${FAMILY_HUB_USERNAME}
      - FAMILY_HUB_PASSWORD=${FAMILY_HUB_PASSWORD}
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8787}:8787"
    volumes:
      - family-hub-data:/app/data

volumes:
  family-hub-data:
