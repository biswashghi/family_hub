services:
  family-hub:
    build:
      context: .
    container_name: family-hub
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8788
      - DATA_DIR=/app/data
      - FAMILY_HUB_TIME_ZONE=${FAMILY_HUB_TIME_ZONE:-America/Detroit}
      - FAMILY_HUB_LOCATION_LABEL=${FAMILY_HUB_LOCATION_LABEL:-Detroit, MI}
      - FAMILY_HUB_WEATHER_LATITUDE=${FAMILY_HUB_WEATHER_LATITUDE:-42.3314}
      - FAMILY_HUB_WEATHER_LONGITUDE=${FAMILY_HUB_WEATHER_LONGITUDE:--83.0458}
      - FAMILY_HUB_SEED_DEMO_DATA=0
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8788}:8788"
    volumes:
      - family-hub-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 8788) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  family-hub-data:
